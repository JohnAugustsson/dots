[ids]
*

[main]
# leave normal typing alone

#[altgr]
#leftbrace  = G-8 # altgr + å : [
#rightbrace = G-9 # altgr + ¨ : ]
#semicolon  = G-7 # altgr + ö : {
#apostrophe = G-0 # altgr + ä : }
#dot        = S-8 # altgr + . : (
#slash      = S-9 # altgr + - : )

[main]
rightalt = layer(symbols)
equal = G-rightbrace

[symbols:G]
leftbrace  = G-8
rightbrace = G-9
equal      = equal
semicolon  = G-7
apostrophe = G-0
dot        = S-8
slash      = S-9

[main]
capslock = overload(nav, esc) #tap caps : escape, hold : nav

[nav]
a = left
s = down
w = up
d = right
h = left
j = down
k = up
l = right
