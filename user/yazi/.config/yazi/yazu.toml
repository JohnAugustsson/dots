[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { name = "*.lua", use = "edit" },
  { name = "*.cpp", use = "edit" },
  { name = "*.c", use = "edit" },
  { name = "*.h", use = "edit" },
  { name = "*.hpp", use = "edit" },
  { name = "*.py", use = "edit" },
  { name = "*.json", use = "edit" },
  { name = "*.toml", use = "edit" },
  { name = "*.md", use = "edit" },
]