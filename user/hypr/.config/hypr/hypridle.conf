general {
    lock_cmd = pidof hyprlock || hyprlock          # start hyprlock only if not already running
    before_sleep_cmd = loginctl lock-session       # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on     # ensure screen wakes after suspend
    on_unlock_cmd = hyprctl dispatch dpms on       # wake screen on successful unlock
    unlock_cmd = hyprctl dispatch dpms on
    inhibit_sleep = 3                              # wait until locked before allowing sleep
}

# Lock the screen after ~5 minutes of inactivity (adjust as you like)
listener {
    timeout = 900                                  # 15 minutes
    on-timeout = loginctl lock-session
}

# Turn screen off ~30 seconds after locking (or adjust to your preference)
listener {
    timeout = 330                                  # 5.5 minutes (30s after lock)
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on           # wake screen on any activity (mouse/keyboard)
}