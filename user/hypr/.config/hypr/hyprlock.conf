general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    ignore_empty_input = true
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = ~/Pictures/wallpapers/aishot-1639.jpg  # ← change to your image
    #path = screenshot                               # or use current desktop screenshot

    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    rounding = 15
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(30, 30, 30, 0.85)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>Enter password...</i>
    hide_input = false
    check_color = rgb(100, 200, 100)
    fail_color = rgb(200, 80, 80)
    fail_text = <i>Wrong password</i>

    position = 0, -80
    halign = center
    valign = center
}

# Clock (always visible on blurred background)
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.9)
    font_size = 64
    font_family = monospace
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date '+%A, %B %d'
    color = rgba(255, 255, 255, 0.7)
    font_size = 18
    position = 0, 80
    halign = center
    valign = center
}